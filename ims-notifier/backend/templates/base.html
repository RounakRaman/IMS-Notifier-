<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}IMS NOTIFIER{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,700;0,9..144,900;1,9..144,400&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #0a0a0a;
      --paper: #f4f1ea;
      --paper-dim: #e8e3d6;
      --accent: #c7391f;
      --accent-dim: #8a2714;
      --muted: #6b6558;
      --rule: #0a0a0a;
    }

    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--paper);
      color: var(--ink);
      font-family: "Fraunces", Georgia, serif;
      font-size: 17px;
      line-height: 1.5;
    }

    body {
      min-height: 100vh;
      background-image:
        radial-gradient(circle at 1px 1px, rgba(10,10,10,0.06) 1px, transparent 0);
      background-size: 4px 4px;
    }

    .mono {
      font-family: "JetBrains Mono", ui-monospace, monospace;
      font-size: 13px;
      letter-spacing: 0.02em;
    }

    .page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 32px 80px;
    }

    header.masthead {
      border-top: 4px solid var(--ink);
      border-bottom: 1px solid var(--ink);
      padding: 18px 0 14px;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 32px;
    }

    .masthead .brand {
      font-family: "Fraunces", serif;
      font-weight: 900;
      font-style: italic;
      font-size: clamp(34px, 6vw, 58px);
      line-height: 1;
      letter-spacing: -0.02em;
    }
    .masthead .brand .amp {
      color: var(--accent);
      font-style: italic;
    }
    .masthead .meta {
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: var(--muted);
    }

    h1, h2, h3 { font-family: "Fraunces", serif; letter-spacing: -0.01em; }
    h2 {
      font-size: 28px;
      margin: 48px 0 12px;
      font-weight: 700;
      border-bottom: 1px solid var(--ink);
      padding-bottom: 8px;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
    }
    h2 .count {
      font-family: "JetBrains Mono", monospace;
      font-size: 13px;
      color: var(--muted);
      font-weight: 500;
    }

    .lede {
      font-size: 19px;
      color: var(--muted);
      max-width: 60ch;
    }

    .card {
      background: #fff;
      border: 1px solid var(--ink);
      box-shadow: 6px 6px 0 var(--ink);
      padding: 22px 24px;
      margin-bottom: 24px;
    }

    .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }

    input[type=text], input[type=password] {
      font-family: "JetBrains Mono", monospace;
      font-size: 14px;
      padding: 12px 14px;
      border: 1px solid var(--ink);
      background: var(--paper);
      outline: none;
      min-width: 240px;
      flex: 1;
    }
    input[type=text]:focus, input[type=password]:focus {
      background: #fff;
      box-shadow: inset 0 -3px 0 var(--accent);
    }

    button, .btn {
      font-family: "JetBrains Mono", monospace;
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 12px 18px;
      background: var(--ink);
      color: var(--paper);
      border: 1px solid var(--ink);
      cursor: pointer;
      transition: transform 80ms ease;
    }
    button:hover, .btn:hover { transform: translate(-2px, -2px); box-shadow: 3px 3px 0 var(--accent); }
    button:active { transform: translate(0, 0); box-shadow: none; }

    button.ghost {
      background: transparent;
      color: var(--ink);
    }
    button.danger {
      background: var(--paper);
      color: var(--accent);
      border-color: var(--accent);
      padding: 6px 10px;
      font-size: 11px;
    }
    button.danger:hover { background: var(--accent); color: #fff; box-shadow: 2px 2px 0 var(--ink); }

    ul.tags { list-style: none; padding: 0; margin: 0; display: flex; flex-wrap: wrap; gap: 10px; }
    ul.tags li {
      border: 1px solid var(--ink);
      padding: 6px 10px 6px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--paper-dim);
    }
    ul.tags li .kw {
      font-family: "JetBrains Mono", monospace;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .empty {
      font-style: italic;
      color: var(--muted);
      padding: 12px 0;
    }

    table.feed {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      border: 1px solid var(--ink);
    }
    table.feed th, table.feed td {
      padding: 12px 14px;
      border-bottom: 1px solid #ddd;
      text-align: left;
      vertical-align: top;
    }
    table.feed th {
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-size: 11px;
      color: var(--muted);
      border-bottom: 2px solid var(--ink);
      font-family: "JetBrains Mono", monospace;
      font-weight: 700;
    }
    table.feed tr:last-child td { border-bottom: none; }
    table.feed .date {
      font-family: "JetBrains Mono", monospace;
      font-size: 12px;
      white-space: nowrap;
      color: var(--muted);
    }
    table.feed .kw-pill {
      font-family: "JetBrains Mono", monospace;
      font-size: 10px;
      font-weight: 700;
      background: var(--accent);
      color: #fff;
      padding: 2px 6px;
      letter-spacing: 0.08em;
    }
    table.feed a { color: var(--accent-dim); word-break: break-all; }

    .stats { display: flex; gap: 24px; flex-wrap: wrap; margin-bottom: 8px; }
    .stat {
      flex: 1;
      min-width: 160px;
      border-left: 4px solid var(--accent);
      padding: 4px 0 4px 14px;
    }
    .stat .n {
      font-family: "Fraunces", serif;
      font-weight: 900;
      font-size: 38px;
      line-height: 1;
    }
    .stat .l {
      font-family: "JetBrains Mono", monospace;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      margin-top: 4px;
    }

    footer.foot {
      margin-top: 64px;
      border-top: 1px solid var(--ink);
      padding-top: 14px;
      font-family: "JetBrains Mono", monospace;
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.14em;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    form.inline { display: inline; margin: 0; }

    .flash {
      background: var(--accent);
      color: #fff;
      padding: 10px 14px;
      font-family: "JetBrains Mono", monospace;
      font-size: 12px;
      letter-spacing: 0.06em;
      margin-bottom: 18px;
    }

    @media (max-width: 620px) {
      .page { padding: 24px 18px 60px; }
      .masthead { padding-top: 14px; }
      h2 { font-size: 22px; }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="masthead">
      <div class="brand">IMS<span class="amp">&middot;</span>NOTIFIER</div>
      <div class="mono meta">EST. 2026 &nbsp;/&nbsp; VOL. I</div>
    </header>
    {% block content %}{% endblock %}
    <footer class="foot">
      <span>Source &rarr; imsnsit.org/imsnsit/notifications.php</span>
      <span>Daily cron &nbsp;|&nbsp; Email &nbsp;|&nbsp; Push</span>
    </footer>
  </main>
</body>
</html>
